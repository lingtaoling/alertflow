<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" fill="none">
  <defs>

    <!-- Circle background gradient: red top → orange mid → yellow bottom -->
    <radialGradient id="bgGrad" cx="50%" cy="38%" r="60%">
      <stop offset="0%"   stop-color="#FF3A3A"/>
      <stop offset="55%"  stop-color="#FF5520"/>
      <stop offset="100%" stop-color="#FFD84A"/>
    </radialGradient>

    <!-- Glow bloom for the white triangle outline -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft edge glow on the circle -->
    <filter id="circleGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip to circle -->
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="92"/>
    </clipPath>

  </defs>

  <!-- ── Background circle with gradient ── -->
  <circle cx="100" cy="100" r="92" fill="url(#bgGrad)" filter="url(#circleGlow)"/>

  <!-- ── Soft radial white bloom in center (the bright core glow) ── -->
  <radialGradient id="bloomGrad" cx="50%" cy="48%" r="40%">
    <stop offset="0%"   stop-color="white" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </radialGradient>
  <circle cx="100" cy="96" r="92" fill="url(#bloomGrad)" clip-path="url(#circleClip)"/>

  <!-- ── Triangle with neon white glow outline ── -->
  <!-- Glow layer (thick, blurred) -->
  <path d="M100 44 C96 44 92 46 90 50 L46 122 C42 129 47 138 55 138 L145 138 C153 138 158 129 154 122 L110 50 C108 46 104 44 100 44 Z"
    fill="none"
    stroke="white"
    stroke-width="22"
    stroke-linejoin="round"
    filter="url(#neonGlow)"
    opacity="0.6"/>

  <!-- Triangle fill (gradient matching bg so it looks cut-out) -->
  <radialGradient id="triFillGrad" cx="50%" cy="40%" r="65%">
    <stop offset="0%"   stop-color="#FF4422"/>
    <stop offset="100%" stop-color="#FF9A20"/>
  </radialGradient>
  <path d="M100 44 C96 44 92 46 90 50 L46 122 C42 129 47 138 55 138 L145 138 C153 138 158 129 154 122 L110 50 C108 46 104 44 100 44 Z"
    fill="url(#triFillGrad)"
    stroke="white"
    stroke-width="9"
    stroke-linejoin="round"
    filter="url(#neonGlow)"/>

  <!-- ── Exclamation mark ── -->
  <!-- Bar glow -->
  <rect x="94.5" y="68" width="11" height="40" rx="5.5"
    fill="white" filter="url(#neonGlow)" opacity="0.7"/>
  <!-- Bar crisp -->
  <rect x="94.5" y="68" width="11" height="40" rx="5.5" fill="white"/>

  <!-- Dot glow -->
  <circle cx="100" cy="122" r="6.5"
    fill="white" filter="url(#neonGlow)" opacity="0.7"/>
  <!-- Dot crisp -->
  <circle cx="100" cy="122" r="6.5" fill="white"/>

</svg>

<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse-ring { 0%,100%{opacity:0.15} 50%{opacity:0.55} }
      @keyframes dash-flow { to { stroke-dashoffset: -24; } }
      @keyframes node-pop { 0%,100%{opacity:0.3;r:5} 50%{opacity:1;r:7} }
      @keyframes alert-blink { 0%,100%{opacity:1} 45%,55%{opacity:0.1} }
      .spin-arc { transform-origin: 340px 140px; animation: spin 1.1s linear infinite; }
      .spin-arc2 { transform-origin: 340px 140px; animation: spin 1.7s linear infinite reverse; }
      .flow-line { stroke-dasharray: 6 6; animation: dash-flow 0.9s linear infinite; }
      .n1 { animation: node-pop 1.4s ease-in-out infinite; }
      .n2 { animation: node-pop 1.4s ease-in-out 0.28s infinite; }
      .n3 { animation: node-pop 1.4s ease-in-out 0.56s infinite; }
      .n4 { animation: node-pop 1.4s ease-in-out 0.84s infinite; }
      .n5 { animation: node-pop 1.4s ease-in-out 1.12s infinite; }
      .alert-icon { animation: alert-blink 1.6s ease-in-out infinite; }
      .ring1 { animation: pulse-ring 2s ease-in-out infinite; }
      .ring2 { animation: pulse-ring 2s ease-in-out 0.5s infinite; }
      .ring3 { animation: pulse-ring 2s ease-in-out 1s infinite; }
    </style>
  </defs>

  <!-- Outer pulse rings -->
  <circle cx="340" cy="140" r="110" fill="none" stroke="#E24B4A" stroke-width="18" class="ring1"/>
  <circle cx="340" cy="140" r="90" fill="none" stroke="#E24B4A" stroke-width="10" class="ring2"/>
  <circle cx="340" cy="140" r="72" fill="none" stroke="#E24B4A" stroke-width="5" class="ring3"/>

  <!-- Spinning arcs -->
  <circle cx="340" cy="140" r="56" fill="none" stroke="#B4B2A9" stroke-width="3"/>
  <path class="spin-arc" d="M 340 84 A 56 56 0 0 1 396 140" fill="none" stroke="#E24B4A" stroke-width="3.5" stroke-linecap="round"/>
  <path class="spin-arc2" d="M 340 196 A 56 56 0 0 1 284 140" fill="none" stroke="#D85A30" stroke-width="2" stroke-linecap="round"/>

  <!-- Inner circle -->
  <circle cx="340" cy="140" r="40" fill="#FCEBEB" stroke="#E24B4A" stroke-width="1"/>

  <!-- Alert icon (triangle + exclamation) -->
  <g class="alert-icon">
    <polygon points="340,112 364,152 316,152" fill="none" stroke="#A32D2D" stroke-width="2.5" stroke-linejoin="round"/>
    <line x1="340" y1="124" x2="340" y2="140" stroke="#A32D2D" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="340" cy="147" r="2" fill="#A32D2D"/>
  </g>

  <!-- Flow lines from center outward -->
  <line x1="300" y1="115" x2="215" y2="80" stroke="#E24B4A" stroke-width="1.5" class="flow-line"/>
  <line x1="380" y1="115" x2="465" y2="80" stroke="#E24B4A" stroke-width="1.5" class="flow-line"/>
  <line x1="270" y1="145" x2="175" y2="148" stroke="#D85A30" stroke-width="1.5" class="flow-line"/>
  <line x1="410" y1="145" x2="505" y2="148" stroke="#D85A30" stroke-width="1.5" class="flow-line"/>
  <line x1="310" y1="172" x2="225" y2="210" stroke="#E24B4A" stroke-width="1.5" class="flow-line"/>
  <line x1="370" y1="172" x2="455" y2="210" stroke="#E24B4A" stroke-width="1.5" class="flow-line"/>

  <!-- Destination nodes -->
  <circle cx="205" cy="75" r="5" fill="#E24B4A" class="n1"/>
  <circle cx="475" cy="75" r="5" fill="#E24B4A" class="n2"/>
  <circle cx="160" cy="148" r="5" fill="#D85A30" class="n3"/>
  <circle cx="520" cy="148" r="5" fill="#D85A30" class="n4"/>
  <circle cx="215" cy="215" r="5" fill="#E24B4A" class="n5"/>
  <circle cx="465" cy="215" r="5" fill="#E24B4A" class="n1"/>

  <!-- Node labels 
  <text class="ts" x="205" y="62" text-anchor="middle" fill="#791F1F">webhook</text>
  <text class="ts" x="475" y="62" text-anchor="middle" fill="#791F1F">slack</text>
  <text class="ts" x="148" y="137" text-anchor="middle" fill="#791F1F">email</text>
  <text class="ts" x="534" y="137" text-anchor="middle" fill="#791F1F">pagerduty</text>
  <text class="ts" x="215" y="232" text-anchor="middle" fill="#791F1F">sms</text>
  <text class="ts" x="465" y="232" text-anchor="middle" fill="#791F1F">teams</text>
-->
  <!-- Status bar at bottom 
  <rect x="140" y="268" width="400" height="32" rx="8" fill="#FCEBEB" stroke="#F09595" stroke-width="0.5"/>
  <rect x="148" y="276" width="0" height="16" rx="4" fill="#E24B4A" id="pbar">
    <animate attributeName="width" from="0" to="384" dur="3s" repeatCount="indefinite"/>
  </rect>
  <text class="ts" x="340" y="289" text-anchor="middle" fill="#791F1F">routing alerts...</text>
  -->
</svg>
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: alerts_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: alert_workflow_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alerts_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/alert_workflow_db
      CORS_ORIGINS: http://localhost:5173,http://localhost:80
    ports:
      - '3000:3000'
    command: sh -c "npx prisma migrate deploy && node dist/main"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alerts_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '80:80'
    environment:
      VITE_API_URL: http://localhost:3000

volumes:
  postgres_data:

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: alerts_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
      POSTGRES_DB: ${PG_DATABASE:-alert_workflow_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alerts_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${PG_USER:-postgres}:${PG_PASSWORD}@postgres:5432/${PG_DATABASE:-alert_workflow_db}
      CORS_ORIGINS: http://localhost:5173,http://localhost:80
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
      WS_RATE_LIMIT_TTL: 60000
      WS_RATE_LIMIT_MAX: 10
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node dist/main"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alerts_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    environment:
      VITE_API_URL: http://localhost:3000

volumes:
  postgres_data:
